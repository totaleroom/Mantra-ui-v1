# =============================================================
# Mantra AI — Production Docker Compose
# Total RAM budget: < 2.6 GB (matches PRD spec)
# All secrets come from a root .env file (see .env.example)
# =============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # -----------------------------------------------------------
  # PostgreSQL 15 — 512 MB
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: mantra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mantra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-mantra_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Bind to localhost only — NOT exposed to public internet.
      # SSH tunnel to access from laptop: ssh -L 5432:localhost:5432 user@vps
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mantra} -d ${POSTGRES_DB:-mantra_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # -----------------------------------------------------------
  # Redis 7 — 256 MB — Persistent AOF storage
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mantra_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      # Bind to localhost only — NOT exposed to public internet.
      # SSH tunnel to access from laptop: ssh -L 6379:localhost:6379 user@vps
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # -----------------------------------------------------------
  # Evolution API — 1 GB
  # -----------------------------------------------------------
  evolution:
    image: atendai/evolution-api:latest
    container_name: mantra_evolution
    restart: unless-stopped
    # Evolution reaches the backend via Docker network (service name).
    # If you need external QR scanning via WhatsApp Manager UI, expose through
    # Coolify/Traefik with its own auth — never bind the port publicly here.
    expose:
      - "8080"
    environment:
      SERVER_URL:                    ${EVOLUTION_SERVER_URL:-${EVO_API_URL:-http://localhost:8080}}
      AUTHENTICATION_API_KEY:        ${EVO_API_KEY:?EVO_API_KEY is required}
      DATABASE_ENABLED:              "true"
      DATABASE_CONNECTION_URI:       postgresql://${POSTGRES_USER:-mantra}:${POSTGRES_PASSWORD}@postgres:5432/evolution_db?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_db
      REDIS_ENABLED:                 "true"
      REDIS_URI:                     redis://redis:6379
      REDIS_PREFIX_KEY:              evolution
      CORS_ORIGIN:                   ${FRONTEND_URL:-*}
      CORS_METHODS:                  "GET,POST,PUT,DELETE,OPTIONS"
      CORS_CREDENTIALS:              "true"
      LOG_LEVEL:                     "ERROR"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # -----------------------------------------------------------
  # Go Fiber Backend — 256 MB
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mantra_backend
    restart: unless-stopped
    # Backend is reached through Coolify/Traefik (service discovery via docker network).
    # Exposing the port publicly bypasses TLS termination and rate limiting at the edge.
    # If running WITHOUT a reverse proxy, change `expose` to `ports: ["127.0.0.1:3001:3001"]`.
    expose:
      - "3001"
    environment:
      PORT:            "3001"
      APP_ENV:         production

      # ── Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantra}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mantra_db}?sslmode=disable
      REDIS_URL:    redis://redis:6379

      # ── Auth & CORS
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}

      # ── Evolution API (canonical EVO_* names)
      EVO_API_URL:      http://evolution:8080
      EVO_API_KEY:      ${EVO_API_KEY:?EVO_API_KEY is required}
      EVO_INSTANCE_NAME: ${EVO_INSTANCE_NAME:-mantra_instance}

      # ── Webhook receiver
      # Evolution calls PUBLIC_BACKEND_URL + /api/webhooks/evolution for every event.
      # Over the docker network the service name "backend" resolves, so we hardcode it.
      # If you run Evolution outside docker-compose, override PUBLIC_BACKEND_URL
      # to your public API URL (e.g. https://api.mantra.yourdomain.com).
      PUBLIC_BACKEND_URL: "${PUBLIC_BACKEND_URL:-http://backend:3001}"
      WEBHOOK_SECRET:     "${WEBHOOK_SECRET:?WEBHOOK_SECRET is required - generate with openssl rand -base64 32}"

      # ── Agentic AI
      HERMES_AUTH_TOKEN: ${HERMES_AUTH_TOKEN:?HERMES_AUTH_TOKEN is required}
      AGENT_CALLBACK_URL: ${AGENT_CALLBACK_URL:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # -----------------------------------------------------------
  # Next.js Frontend — 256 MB
  # -----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* args are baked into the client bundle at build time.
        # For Coolify/VPS: set these to your public URLs (e.g. https://api.yourdomain.com)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required (e.g. https://api.yourdomain.com)}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required (e.g. wss://api.yourdomain.com)}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-${NEXT_PUBLIC_API_URL}}
        NEXT_PUBLIC_EVO_URL: ${NEXT_PUBLIC_EVO_URL:-http://evolution:8080}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-${FRONTEND_URL}}
    container_name: mantra_frontend
    restart: unless-stopped
    # Frontend is reached through Coolify/Traefik. If running standalone, use
    # `ports: ["127.0.0.1:5000:5000"]` and put a reverse proxy in front.
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Server-to-server — hits backend over docker network directly
      BACKEND_INTERNAL_URL: http://backend:3001
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      EVO_API_KEY: ${EVO_API_KEY:-}
      HERMES_AUTH_TOKEN: ${HERMES_AUTH_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── RAM Summary (limits) ────────────────────────────────────
#   postgres:   512 MB
#   redis:      256 MB
#   evolution:    1 GB
#   backend:    256 MB
#   frontend:   256 MB
#   TOTAL:     2304 MB  (< 2.6 GB PRD budget ✓)
