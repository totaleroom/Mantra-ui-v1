version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mantra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mantra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mantra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantra -d mantra_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: mantra_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  evolution:
    image: atendai/evolution-api:latest
    container_name: mantra_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: postgresql://mantra:${POSTGRES_PASSWORD}@postgres:5432/evolution_db?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_db
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_CREDENTIALS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build: .
    container_name: mantra_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      APP_ENV: production
      DATABASE_URL: postgresql://mantra:${POSTGRES_PASSWORD}@postgres:5432/mantra_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
